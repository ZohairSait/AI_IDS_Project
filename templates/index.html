<!DOCTYPE html>
<html>
<head>
    <title>AI IDS Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background-color: #111;
            color: white;
        }

        h2 {
            text-align: center;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            background-color: #222;
        }

        th, td {
            padding: 10px;
            border: 1px solid #444;
            text-align: center;
        }

        th {
            background-color: #333;
        }

        .attack {
            background-color: #ff4c4c;
            color: white;
        }

        .normal {
            background-color: #2ecc71;
            color: white;
        }
    </style>

    <script>
        async function loadData() {
            const res = await fetch('/data');
            const data = await res.json();

            let rows = "";

            data.reverse().forEach(d => {

                let cls = (d.type === "Normal") ? "normal" : "attack";

                rows += `<tr class="${cls}">
                    <td>${d.time}</td>
                    <td>${d.flow}</td>
                    <td>${d.error}</td>
                    <td>${d.type}</td>
                </tr>`;
            });

            document.getElementById("table").innerHTML = rows;
        }

        setInterval(loadData, 2000);
    </script>
</head>

<body>
    <h2>🚀 AI Intrusion Detection Dashboard</h2>

    <table>
        <tr>
            <th>Time</th>
            <th>Flow</th>
            <th>Error</th>
            <th>Attack Type</th>
        </tr>

        <tbody id="table"></tbody>
    </table>
</body>
</html>
